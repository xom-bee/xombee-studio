<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="wpCoreGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.13"/>
      <stop offset="55%" stop-color="#E6A15A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wpPointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="wpSymGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0B0B0F"/>
  <!-- Ambient glow field -->
  <rect width="1920" height="1080" fill="url(#wpCoreGlow)"/>
  <!-- Point glow behind symbol -->
  <ellipse cx="960" cy="440" rx="280" ry="220" fill="url(#wpPointGlow)"/>
  <!-- Symbol — large, centered, dominant -->
  <!-- Scale 5x from 80x80: v_r=160, h=150, center (960, 450) -->
  <g filter="url(#wpSymGlow)">
    <!-- Outer ghost ring -->
    <polygon points="960,261 1110,348 1110,552 960,639 810,552 810,348"
      stroke="#E6A15A" stroke-width="1.5" fill="none" opacity="0.18"/>
    <!-- Primary hex: v_r=160, h=150, center (960,450) -->
    <polygon points="960,290 1110,370 1110,530 960,610 810,530 810,370"
      stroke="#E6A15A" stroke-width="3" fill="#E6A15A" fill-opacity="0.08"/>
    <!-- SY monogram -->
    <text x="960" y="468" text-anchor="middle"
      fill="#E6A15A" font-size="88" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="8">SY</text>
  </g>
  <!-- Wordmark -->
  <text x="960" y="720" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.88" font-size="72" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="14">YOESEL</text>
  <!-- Tagline -->
  <text x="960" y="768" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.30" font-size="20" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="8">DESIGN &amp; MUSIC</text>
  <!-- Rule -->
  <line x1="912" y1="820" x2="1008" y2="820"
    stroke="#E6A15A" stroke-width="1" stroke-opacity="0.35"/>
</svg>
