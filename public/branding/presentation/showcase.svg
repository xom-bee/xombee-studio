    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">MONOCHROME — WHITE</text>

  <!-- BLACK on white — right -->
  <rect x="800" y="440" width="320" height="200" rx="4" fill="#FFFFFF"/>
  <g transform="translate(860, 452)">
    <polygon points="100,2 130,19 130,51 100,68 70,51 70,19"
