  <line x1="80" y1="84" x2="1520" y2="84"
    stroke="#E6A15A" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- PRIMARY (dark bg, glow) — large center top -->
  <rect x="580" y="120" width="440" height="260" rx="4" fill="#0D0D11"/>
  <g transform="translate(680, 132)">
    <!-- Symbol at scale 1.5x, center (120,80) -->
    <polygon points="120,3 165,28 165,72 120,97 75,72 75,28"
      stroke="#E6A15A" stroke-width="1.1" fill="none" opacity="0.25"/>
    <polygon points="120,12 157,33 157,87 120,108 83,87 83,33"
      stroke="#E6A15A" stroke-width="2" fill="#E6A15A" fill-opacity="0.09"/>
    <text x="120" y="68" text-anchor="middle"
      fill="#E6A15A" font-size="26" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">SY</text>
    <text x="120" y="148" text-anchor="middle"
      fill="#FFFFFF" fill-opacity="0.88" font-size="22" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="4">YOESEL</text>
    <text x="120" y="168" text-anchor="middle"
      fill="#FFFFFF" fill-opacity="0.32" font-size="8"
      font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">DESIGN &amp; MUSIC</text>
  </g>
  <text x="800" y="404" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.4" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">PRIMARY — DARK</text>

  <!-- AMBER on transparent — left -->
  <rect x="80" y="440" width="320" height="200" rx="4" fill="#111115"/>
  <g transform="translate(140, 452)">
    <polygon points="100,2 130,19 130,51 100,68 70,51 70,19"
      stroke="#E6A15A" stroke-width="0.7" fill="none" opacity="0.28"/>
    <polygon points="100,8 125,22 125,48 100,62 75,48 75,22"
      stroke="#E6A15A" stroke-width="1.4" fill="#E6A15A" fill-opacity="0.07"/>
    <text x="100" y="40" text-anchor="middle"
      fill="#E6A15A" font-size="16" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
    <text x="100" y="100" text-anchor="middle"
      fill="#E6A15A" font-size="18" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">YOESEL</text>
    <text x="100" y="118" text-anchor="middle"
      fill="#E6A15A" fill-opacity="0.5" font-size="8"
      font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="2">DESIGN &amp; MUSIC</text>
  </g>
  <text x="240" y="664" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.4" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">PRIMARY — AMBER</text>

  <!-- WHITE on dark — center -->
  <rect x="440" y="440" width="320" height="200" rx="4" fill="#0A0A0E"/>
  <g transform="translate(500, 452)">
    <polygon points="100,2 130,19 130,51 100,68 70,51 70,19"
