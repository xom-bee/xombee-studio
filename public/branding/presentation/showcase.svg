      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">SY</text>
  </g>
  <text x="1340" y="664" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.4" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">SYMBOL — MARK</text>

  <!-- Color palette swatches -->
  <text x="80" y="730" fill="#E6A15A" fill-opacity="0.4" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">COLOUR SYSTEM</text>
  <!-- Amber -->
  <rect x="80" y="746" width="48" height="48" rx="4" fill="#E6A15A"/>
  <text x="104" y="810" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.5" font-size="8"
    font-family="'Helvetica Neue',Arial,sans-serif">#E6A15A</text>
  <!-- Dark -->
  <rect x="144" y="746" width="48" height="48" rx="4" fill="#0B0B0F" stroke="#333" stroke-width="0.5"/>
  <text x="168" y="810" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.5" font-size="8"
    font-family="'Helvetica Neue',Arial,sans-serif">#0B0B0F</text>
  <!-- White -->
  <rect x="208" y="746" width="48" height="48" rx="4" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="232" y="810" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.5" font-size="8"
    font-family="'Helvetica Neue',Arial,sans-serif">#FFFFFF</text>

  <!-- Footer line -->
  <line x1="80" y1="860" x2="1520" y2="860"
    stroke="#E6A15A" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="80" y="878" fill="#FFFFFF" fill-opacity="0.15" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">yoesel.com</text>
  <text x="1520" y="878" text-anchor="end" fill="#FFFFFF" fill-opacity="0.15" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">BRAND IDENTITY SYSTEM — CONFIDENTIAL</text>
</svg>
