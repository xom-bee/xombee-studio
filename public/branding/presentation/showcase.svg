    <text x="100" y="40" text-anchor="middle"
      fill="#000000" font-size="16" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
    <text x="100" y="100" text-anchor="middle"
      fill="#000000" font-size="18" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">YOESEL</text>
    <text x="100" y="118" text-anchor="middle"
      fill="#000000" fill-opacity="0.4" font-size="8"
      font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="2">DESIGN &amp; MUSIC</text>
  </g>
  <text x="960" y="664" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.4" font-size="9"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">MONOCHROME — BLACK</text>

  <!-- SYMBOL ONLY — right -->
  <rect x="1160" y="440" width="360" height="200" rx="4" fill="#0D0D11"/>
  <g transform="translate(1260, 460)">
    <!-- Symbol only, large, centered in 160x160 area -->
    <polygon points="80,3 145,39 145,121 80,157 15,121 15,39"
