    <text x="100" y="40" text-anchor="middle"
      fill="#FFFFFF" font-size="16" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
    <text x="100" y="100" text-anchor="middle"
      fill="#FFFFFF" fill-opacity="0.9" font-size="18" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">YOESEL</text>
    <text x="100" y="118" text-anchor="middle"
      fill="#FFFFFF" fill-opacity="0.4" font-size="8"
      font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="2">DESIGN &amp; MUSIC</text>
