<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <radialGradient id="postGlow" cx="50%" cy="40%" r="38%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#E6A15A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="postSymGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="1200" fill="#0B0B0F"/>
  <rect width="800" height="1200" fill="url(#postGlow)"/>
  <!-- Top decorative line -->
  <line x1="80" y1="80" x2="720" y2="80"
    stroke="#E6A15A" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Symbol — large, centered at (400, 440) -->
  <!-- Scale 4x: v_r=128, h=120, center (400,440) -->
  <g filter="url(#postSymGlow)">
    <polygon points="400,298 520,365 520,515 400,582 280,515 280,365"
      stroke="#E6A15A" stroke-width="1.2" fill="none" opacity="0.22"/>
    <polygon points="400,312 512,374 512,506 400,568 288,506 288,374"
      stroke="#E6A15A" stroke-width="2.5" fill="#E6A15A" fill-opacity="0.09"/>
    <text x="400" y="452" text-anchor="middle"
      fill="#E6A15A" font-size="72" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="7">SY</text>
  </g>
  <!-- Wordmark -->
  <text x="400" y="680" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.9" font-size="56" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="10">YOESEL</text>
  <!-- Tagline -->
  <text x="400" y="718" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.38" font-size="12" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3.5">DIGITAL DESIGNER FOR CREATIVE ARTISTS</text>
  <!-- Decorative rule -->
  <line x1="376" y1="754" x2="424" y2="754"
    stroke="#E6A15A" stroke-width="0.75" stroke-opacity="0.38"/>
  <!-- Bottom caption -->
  <text x="400" y="1100" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.16" font-size="11" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="4">yoesel.com</text>
  <!-- Bottom line -->
  <line x1="80" y1="1120" x2="720" y2="1120"
    stroke="#E6A15A" stroke-width="0.5" stroke-opacity="0.15"/>
</svg>
