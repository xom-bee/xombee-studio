<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background with subtle rounded corners for app icon contexts -->
  <rect width="100" height="100" rx="18" fill="#0B0B0F"/>
  <!-- Ambient glow -->
  <radialGradient id="fg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="18" fill="url(#fg)"/>
  <!-- Single clean hexagon — no outer ring at small sizes -->
  <polygon points="50,12 86,31 86,69 50,88 14,69 14,31"
    stroke="#E6A15A" stroke-width="2.5" fill="#E6A15A" fill-opacity="0.10"/>
  <!-- SY monogram — large enough to read at 32px -->
  <text x="50" y="61" text-anchor="middle"
    fill="#E6A15A" font-size="22" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
</svg>
