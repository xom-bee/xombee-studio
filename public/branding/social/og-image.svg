<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="ogGlow" cx="50%" cy="47%" r="38%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.11"/>
      <stop offset="65%" stop-color="#E6A15A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="ogSymbolGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0B0F"/>
  <!-- Ambient glow -->
  <rect width="1200" height="630" fill="url(#ogGlow)"/>
  <!-- Symbol — centered, scaled to ~130px tall -->
  <!-- Hex coords: center (600, 255), vertical_r=52, horizontal=49 -->
  <g filter="url(#ogSymbolGlow)">
    <!-- Outer ghost ring -->
    <polygon points="600,197 649,223 649,287 600,313 551,287 551,223"
      stroke="#E6A15A" stroke-width="1.2" fill="none" opacity="0.25"/>
    <!-- Primary hex -->
    <polygon points="600,203 645,229 645,281 600,307 555,281 555,229"
      stroke="#E6A15A" stroke-width="2.2" fill="#E6A15A" fill-opacity="0.09"/>
    <!-- SY monogram -->
    <text x="600" y="265" text-anchor="middle"
      fill="#E6A15A" font-size="29" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">SY</text>
  </g>
  <!-- Studio name -->
  <text x="600" y="400" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.92" font-size="62" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="-1">Yoesel</text>
  <!-- Tagline -->
  <text x="600" y="438" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.34" font-size="19" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="5">DESIGN &amp; MUSIC</text>
  <!-- Bottom rule -->
  <line x1="576" y1="526" x2="624" y2="526"
    stroke="#E6A15A" stroke-width="1" stroke-opacity="0.40"/>
</svg>
