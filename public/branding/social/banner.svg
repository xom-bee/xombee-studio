<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="bannerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="bannerSymGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1500" height="500" fill="#0B0B0F"/>
  <rect width="1500" height="500" fill="url(#bannerGlow)"/>
  <!-- Horizontal layout: symbol left of wordmark -->
  <!-- Symbol centered at (750, 250), scale ~2x -->
  <g filter="url(#bannerSymGlow)">
    <!-- Outer ghost, scale 2.4, center (750,250) -->
    <polygon points="750,158 942,265 942,395 750,342 558,395 558,265"
      stroke="#E6A15A" stroke-width="1" fill="none" opacity="0.2"/>
    <!-- Primary hex, scale 2.4 → v_r=77, h=72, center (600,250) -->
    <!-- Horizontal layout: symbol at x=400, wordmark at x=660 -->
    <polygon points="400,174 472,215 472,285 400,326 328,285 328,215"
      stroke="#E6A15A" stroke-width="2" fill="#E6A15A" fill-opacity="0.09"/>
    <text x="400" y="260" text-anchor="middle"
      fill="#E6A15A" font-size="36" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="3">SY</text>
  </g>
  <!-- Vertical divider -->
  <line x1="530" y1="210" x2="530" y2="290"
    stroke="#E6A15A" stroke-width="0.75" stroke-opacity="0.25"/>
  <!-- Wordmark -->
  <text x="740" y="236" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.9" font-size="52" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="8">YOESEL</text>
  <!-- Tagline -->
  <text x="740" y="272" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.38" font-size="14" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3.5">DIGITAL DESIGNER FOR CREATIVE ARTISTS</text>
</svg>
