<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="ambientGlow" cx="50%" cy="30%" r="38%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.13"/>
      <stop offset="70%" stop-color="#E6A15A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="symbolGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="320" height="180" fill="#0B0B0F"/>
  <!-- Ambient amber glow behind symbol -->
  <rect width="320" height="180" fill="url(#ambientGlow)"/>
  <!-- Symbol with glow -->
  <g transform="translate(120, 8)" filter="url(#symbolGlow)">
    <polygon points="40,2 74,20 74,60 40,78 6,60 6,20"
      stroke="#E6A15A" stroke-width="0.75" fill="none" opacity="0.22"/>
    <polygon points="40,8 70,24 70,56 40,72 10,56 10,24"
      stroke="#E6A15A" stroke-width="1.5" fill="#E6A15A" fill-opacity="0.09"/>
    <text x="40" y="47" text-anchor="middle"
      fill="#E6A15A" font-size="18" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
  </g>
  <!-- Wordmark — cool white in dark context -->
  <text x="160" y="128" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.88" font-size="26" font-weight="700"
    font-family="Georgia,'Times New Roman',serif" letter-spacing="5">YOESEL</text>
  <!-- Tagline — ghost white -->
  <text x="160" y="150" text-anchor="middle"
    fill="#FFFFFF" fill-opacity="0.34" font-size="10" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="3">DESIGN &amp; MUSIC</text>
  <!-- Rule -->
  <line x1="136" y1="166" x2="184" y2="166"
    stroke="#E6A15A" stroke-width="0.75" stroke-opacity="0.38"/>
</svg>
