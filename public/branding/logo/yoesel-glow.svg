<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="heavyGlow" cx="50%" cy="30%" r="48%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#E6A15A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E6A15A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E6A15A" stop-opacity="0"/>
    </radialGradient>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Near-black background — slightly deeper than #0B0B0F -->
  <rect width="320" height="180" fill="#060609"/>
  <!-- Heavy ambient glow layer -->
  <rect width="320" height="180" fill="url(#heavyGlow)"/>
  <!-- Core point glow behind symbol -->
  <ellipse cx="160" cy="48" rx="58" ry="46" fill="url(#coreGlow)"/>
  <!-- Symbol with strong glow filter -->
  <g transform="translate(120, 8)" filter="url(#strongGlow)">
    <polygon points="40,2 74,20 74,60 40,78 6,60 6,20"
      stroke="#E6A15A" stroke-width="0.9" fill="none" opacity="0.42"/>
    <polygon points="40,8 70,24 70,56 40,72 10,56 10,24"
      stroke="#E6A15A" stroke-width="1.8" fill="#E6A15A" fill-opacity="0.13"/>
    <text x="40" y="47" text-anchor="middle"
      fill="#E6A15A" font-size="18" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="2">SY</text>
  </g>
  <!-- Wordmark with glow -->
  <g filter="url(#textGlow)">
    <text x="160" y="128" text-anchor="middle"
      fill="#E6A15A" fill-opacity="0.92" font-size="26" font-weight="700"
      font-family="Georgia,'Times New Roman',serif" letter-spacing="5">YOESEL</text>
  </g>
  <!-- Tagline — dimmed amber -->
  <text x="160" y="150" text-anchor="middle"
    fill="#E6A15A" fill-opacity="0.38" font-size="7.5" font-weight="400"
    font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="1.4">DIGITAL DESIGNER FOR CREATIVE ARTISTS</text>
  <!-- Glowing rule -->
  <line x1="136" y1="166" x2="184" y2="166"
    stroke="#E6A15A" stroke-width="1" stroke-opacity="0.62"/>
</svg>
